<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Inventario - GearStack</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Inventario de Herramientas</h1>
    <table>
        <thead>
            <tr>
                <th>Ítem</th>
                <th>Categoría</th>
                <th>Marca</th>
                <th>Fecha Adquisición</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.name }}</td>
                <td>{{ item.category.name }}</td>
                <td>{{ item.brand }}</td>
                <td>{{ item.purchase_date|default:"-" }}</td>
                <td>
                    <a href="{% url 'item_detail' item.id %}">Ver Detalles</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No hay herramientas registradas aún.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
